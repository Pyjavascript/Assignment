<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokemon UI</title>

    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="main">
      <div class="container">
        <nav>
          <div class="nav-left">
            <div class="icon">
              <i class="ri-menu-line"></i>
            </div>
          </div>

          <img
            src="https://upload.wikimedia.org/wikipedia/commons/9/98/International_Pok%C3%A9mon_logo.svg"
            alt=""
          />

          <div class="nav-right">
            <div class="icon">
              <i class="ri-sun-line"></i>
            </div>
          </div>
        </nav>

        <div class="search-section">
          <div class="search-box">
            <i class="ri-search-line"></i>
            <input type="text" placeholder="Search for a Pokémon..." />
          </div>

          <div class="filter-section">
            <button>
              <p>Filter by type</p>
              <i class="ri-arrow-down-s-line"></i>
            </button>

            <div class="filter-icon">
              <i class="ri-equalizer-line"></i>
            </div>
          </div>
        </div>

        <div class="cards">
          <div class="card grass">
            <div class="card-top">
              <div class="top-left">
                <p>#0908</p>
                <i class="ri-leaf-fill"></i>
              </div>

              <div class="heart">
                <i class="ri-heart-line"></i>
              </div>
            </div>

            <div class="img-container">
              <div class="circle"></div>

              <img
                src="https://www.pokemon.com/static-assets/content-assets/cms2/img/pokedex/full/908.png"
                alt=""
              />
            </div>

            <div class="card-data">
              <h2>Meowscarada</h2>

              <div class="bottom">
                <div class="type">
                  <i class="ri-leaf-fill"></i>
                  <span>GRASS</span>
                </div>

                <div class="arrow">
                  <i class="ri-arrow-right-line"></i>
                </div>
              </div>
            </div>
          </div>

          <div class="card steel">
            <div class="card-top">
              <div class="top-left">
                <p>#0624</p>
                <i class="ri-focus-2-line"></i>
              </div>

              <div class="heart">
                <i class="ri-heart-line"></i>
              </div>
            </div>

            <div class="img-container">
              <div class="circle"></div>

              <img
                src="https://www.pokemon.com/static-assets/content-assets/cms2/img/pokedex/full/624.png"
                alt=""
              />
            </div>

            <div class="card-data">
              <h2>Pawniard</h2>

              <div class="bottom">
                <div class="type">
                  <i class="ri-focus-2-line"></i>
                  <span>DARK / STEEL</span>
                </div>

                <div class="arrow">
                  <i class="ri-arrow-right-line"></i>
                </div>
              </div>
            </div>
          </div>

          <div class="card fire">
            <div class="card-top">
              <div class="top-left">
                <p>#0229</p>
                <i class="ri-fire-fill"></i>
              </div>

              <div class="heart">
                <i class="ri-heart-line"></i>
              </div>
            </div>

            <div class="img-container">
              <div class="circle"></div>

              <img
                src="https://www.pokemon.com/static-assets/content-assets/cms2/img/pokedex/full/229.png"
                alt=""
              />
            </div>

            <div class="card-data">
              <h2>Houndoom</h2>

              <div class="bottom">
                <div class="type">
                  <i class="ri-fire-fill"></i>
                  <span>DARK / FIRE</span>
                </div>

                <div class="arrow">
                  <i class="ri-arrow-right-line"></i>
                </div>
              </div>
            </div>
          </div>

          <div class="card water">
            <div class="card-top">
              <div class="top-left">
                <p>#0686</p>
                <i class="ri-drop-fill"></i>
              </div>

              <div class="heart">
                <i class="ri-heart-line"></i>
              </div>
            </div>

            <div class="img-container">
              <div class="circle"></div>

              <img
                src="https://www.pokemon.com/static-assets/content-assets/cms2/img/pokedex/full/686.png"
                alt=""
              />
            </div>

            <div class="card-data">
              <h2>Inkay</h2>

              <div class="bottom">
                <div class="type">
                  <i class="ri-drop-fill"></i>
                  <span>DARK / PSYCHIC</span>
                </div>

                <div class="arrow">
                  <i class="ri-arrow-right-line"></i>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="features">
          <div class="feature-box">
            <i class="ri-football-fill"></i>

            <div>
              <h4>Explore</h4>
              <p>Discover all your favorite Pokémon</p>
            </div>
          </div>

          <div class="feature-box">
            <i class="ri-leaf-fill"></i>

            <div>
              <h4>Filter</h4>
              <p>Find Pokémon by types and abilities</p>
            </div>
          </div>

          <div class="feature-box">
            <i class="ri-star-fill"></i>

            <div>
              <h4>Collection</h4>
              <p>Save and manage your collection</p>
            </div>
          </div>

          <div class="feature-box">
            <i class="ri-user-star-fill"></i>

            <div>
              <h4>Stats</h4>
              <p>View stats and learn about Pokémon</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
